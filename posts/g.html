<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>g | Md Arafat Hosen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .post-navigation { margin-top: 60px; padding-top: 30px; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .nav-group { display: flex; gap: 10px; }
        .blog-container { padding: 120px 20px 60px; max-width: 850px; margin: 0 auto; min-height: 70vh; }
        .featured-img { width: 100%; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .btn-nav { background: #3b82f6; color: white; padding: 10px 22px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.3s; display: inline-block; border: none; cursor: pointer; }
        .btn-nav:hover { background: #1d4ed8; transform: translateY(-2px); }
        article img { max-width: 100%; border-radius: 12px; }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="../index.html" class="logo">Md Arafat Hosen</a>
            <nav><ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../blog.html">Blog</a></li>
            </ul></nav>
        </div>
    </header>

    <main class="container blog-container">
        <p style="color: #6366f1; font-weight: bold; text-transform: uppercase; margin-bottom: 10px;">Web Development</p>
        <h1 style="color: #1e293b; margin-bottom: 25px; font-size: 2.8rem; line-height: 1.2;">g</h1>
        <img src="" class="featured-img">
        <article style="font-size: 1.15rem; color: #334155; line-height: 1.8;"><p><br></p></article>

        <div class="post-navigation">
            <a href="../blog.html" class="btn-nav" style="background: #64748b;">All Posts</a>
            <div class="nav-group" id="navGroup"></div>
        </div>
    </main>

    <footer style="padding: 40px 0; text-align: center; border-top: 1px solid #eee; margin-top: 60px;">
        <p>© 2026 Md Arafat Hosen. All rights reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U",
            authDomain: "md-arafat-hosen.firebaseapp.com",
            projectId: "md-arafat-hosen"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function initNav() {
            const currentSlug = "g";
            const q = query(collection(db, "blogs"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            const blogs = [];
            querySnapshot.forEach((doc) => blogs.push(doc.data()));

            const index = blogs.findIndex(b => b.slug === currentSlug);
            const navGroup = document.getElementById('navGroup');

            if (index < blogs.length - 1) {
                navGroup.innerHTML += '<a href="' + blogs[index + 1].slug + '.html" class="btn-nav">Previous</a>';
            }
            if (index > 0) {
                navGroup.innerHTML += '<a href="' + blogs[index - 1].slug + '.html" class="btn-nav">Next</a>';
            }
        }
        initNav();
    </script>
</body>
</html>

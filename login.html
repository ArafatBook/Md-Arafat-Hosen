<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Md Arafat Hosen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at top left, #1e293b, #0f172a); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass p-10 rounded-2xl shadow-2xl w-full max-w-md border border-white/10">
        <div class="text-center mb-8">
            <div class="bg-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/50">
                <i class="fas fa-lock text-2xl text-white"></i>
            </div>
            <h2 class="text-3xl font-bold text-white uppercase tracking-wider">Admin Login</h2>
            <p class="text-gray-400 mt-2">Access your Dashboard</p>
        </div>

        <div class="space-y-5">
            <input type="email" id="email" placeholder="Admin Email" class="w-full bg-gray-800/50 border border-gray-700 text-white p-3.5 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            <input type="password" id="password" placeholder="Password" class="w-full bg-gray-800/50 border border-gray-700 text-white p-3.5 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition duration-300 transform active:scale-95">
                SIGN IN <i class="fas fa-sign-in-alt ml-2"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.innerText = "Verifying...";
            signInWithEmailAndPassword(auth, email, password)
                .then(() => { window.location.href = "dashboard.html"; })
                .catch((error) => { alert("Access Denied!"); btn.innerText = "SIGN IN"; });
        });
    </script>
</body>
</html>

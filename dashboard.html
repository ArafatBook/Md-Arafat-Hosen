<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arafat OS | Professional CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root { 
            --accent: #6366f1; 
            --bg-dark: #0f172a; 
            --panel: #1e293b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f1f5f9; 
            display: none; 
            overflow-x: hidden;
        }

        /* Glassmorphism Effects */
        .glass-sidebar { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .main-card { 
            background: var(--panel); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 24px;
        }

        /* Editor Styling */
        #editor { 
            height: 600px; 
            background: #020617; 
            border: none !important; 
            color: #e2e8f0; 
            font-size: 18px; 
            border-radius: 0 0 16px 16px;
        }
        
        .ql-toolbar { 
            background: #334155 !important; 
            border: none !important; 
            border-radius: 16px 16px 0 0;
            padding: 12px !important;
        }

        .ql-snow .ql-stroke { stroke: #cbd5e1 !important; }
        .ql-snow .ql-fill { fill: #cbd5e1 !important; }
        .ql-snow .ql-picker { color: #cbd5e1 !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .glow-button {
            position: relative;
            transition: 0.3s;
            overflow: hidden;
        }
        .glow-button:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen">

    <aside class="fixed w-64 h-screen glass-sidebar hidden lg:flex flex-col z-50">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="fas fa-terminal text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Arafat <span class="text-indigo-500">OS</span></h1>
            </div>
        </div>
        
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <p class="text-[10px] uppercase font-bold text-slate-500 ml-4 mb-2 tracking-widest">Main Menu</p>
            <a href="#" class="flex items-center p-3 rounded-xl bg-indigo-600/10 text-indigo-400 font-semibold border border-indigo-500/20">
                <i class="fas fa-pen-nib mr-3"></i> Create Post
            </a>
            <a href="#" onclick="localStorage.removeItem('my_gh_token'); location.reload();" class="flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition">
                <i class="fas fa-shield-alt mr-3"></i> API Security
            </a>
        </nav>

        <div class="p-6">
            <button id="logoutBtn" class="w-full p-3 rounded-xl bg-red-500/10 text-red-400 text-sm font-bold hover:bg-red-500 hover:text-white transition">
                <i class="fas fa-sign-out-alt mr-2"></i> Sign Out
            </button>
        </div>
    </aside>

    <main class="lg:ml-64 p-6 md:p-10 lg:p-16">
        <header class="mb-12 flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div>
                <h2 class="text-4xl font-extrabold text-white mb-2">Editor Studio</h2>
                <div class="flex items-center gap-4 text-sm">
                    <span class="flex items-center gap-2 text-green-400"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> System Online</span>
                    <span class="text-slate-500">|</span>
                    <span id="wordCount" class="text-slate-400"><i class="fas fa-file-alt mr-1"></i> 0 Words</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right mr-4">
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-tighter">Read Time</p>
                    <p id="readTime" class="text-lg font-bold text-indigo-400">0 min</p>
                </div>
                <button id="publishBtn" class="glow-button px-8 py-4 bg-indigo-600 rounded-2xl text-white font-bold shadow-xl shadow-indigo-600/20 flex items-center gap-2">
                    <i class="fas fa-rocket"></i> PUBLISH LIVE
                </button>
            </div>
        </header>

        <div class="max-w-5xl mx-auto space-y-8">
            <div class="main-card p-8">
                <input type="text" id="postTitle" placeholder="Post Title Here..." class="w-full bg-transparent text-5xl font-bold outline-none border-none placeholder-slate-700 text-white mb-6">
                <div class="flex flex-wrap items-center gap-4 border-t border-slate-700/50 pt-6">
                    <div class="flex items-center bg-slate-900/50 px-4 py-2 rounded-lg border border-slate-700">
                        <i class="fas fa-link text-xs text-slate-500 mr-2"></i>
                        <span class="text-slate-500 text-xs font-mono">/posts/</span>
                        <input type="text" id="postSlug" placeholder="url-slug" class="bg-transparent text-indigo-400 outline-none font-mono text-xs ml-1 w-48">
                    </div>
                    <div class="flex items-center bg-slate-900/50 px-4 py-2 rounded-lg border border-slate-700">
                        <i class="fas fa-tag text-xs text-slate-500 mr-2"></i>
                        <input type="text" id="categoryInput" list="categoryList" placeholder="Category" class="bg-transparent text-slate-300 outline-none text-xs w-32">
                        <datalist id="categoryList">
                            <option value="Web Development"><option value="Graphics Design"><option value="Tech News">
                        </datalist>
                    </div>
                </div>
            </div>

            <div class="main-card p-6">
                <div class="flex items-center gap-2 mb-3 text-slate-400">
                    <i class="fas fa-search text-xs"></i>
                    <label class="text-[10px] font-bold uppercase tracking-widest">Search Engine Optimization (Meta)</label>
                </div>
                <textarea id="metaDesc" placeholder="Describe this post for Google..." class="w-full bg-slate-900/30 rounded-xl p-4 outline-none text-slate-400 resize-none h-20 text-sm border border-slate-700/50 focus:border-indigo-500/50 transition"></textarea>
            </div>

            <div class="shadow-2xl rounded-2xl overflow-hidden border border-white/5">
                <div id="editor"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U",
            authDomain: "md-arafat-hosen.firebaseapp.com",
            projectId: "md-arafat-hosen",
            storageBucket: "md-arafat-hosen.firebasestorage.app",
            appId: "1:170687583576:web:ebffeccc9f6ead20cd412d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => { 
            if (user) document.body.style.display = "block"; 
            else window.location.href = "login.html"; 
        });

        // Slug Generation
        document.getElementById('postTitle').addEventListener('input', (e) => {
            document.getElementById('postSlug').value = e.target.value.toLowerCase().trim()
                .replace(/ /g, '-').replace(/[^\w-]+/g, '');
        });

        // Initialize Quill
        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Start writing your masterpiece...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'blockquote', 'code-block'],
                    ['clean']
                ]
            }
        });

        // Stats Logic (Word count & Read time)
        quill.on('text-change', () => {
            const text = quill.getText().trim();
            const words = text.length > 0 ? text.split(/\s+/).length : 0;
            const time = Math.ceil(words / 200);
            document.getElementById('wordCount').innerHTML = `<i class="fas fa-file-alt mr-1"></i> ${words} Words`;
            document.getElementById('readTime').innerText = `${time} min`;
        });

        // Publish Logic
        document.getElementById('publishBtn').addEventListener('click', async () => {
            const title = document.getElementById('postTitle').value;
            const slug = document.getElementById('postSlug').value;
            const meta = document.getElementById('metaDesc').value;
            const category = document.getElementById('categoryInput').value || "General";
            const content = quill.root.innerHTML;

            if(!title || !slug) return alert("Title and Slug are required!");

            let GITHUB_TOKEN = localStorage.getItem('my_gh_token');
            if (!GITHUB_TOKEN) {
                GITHUB_TOKEN = prompt("Enter GitHub Token:");
                if (GITHUB_TOKEN) localStorage.setItem('my_gh_token', GITHUB_TOKEN); else return;
            }

            const btn = document.getElementById('publishBtn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> DEPLOYING...';
            btn.disabled = true;

            try {
                // 1. Firebase Sync (Database only - no image)
                await addDoc(collection(db, "blogs"), { 
                    title, 
                    slug, 
                    category, 
                    timestamp: serverTimestamp() 
                });

                // 2. HTML Template Generation
                const htmlTemplate = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>\${title} | Md Arafat Hosen</title>
    <meta name="description" content="\${meta}">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="post-page">
    <article class="content-wrapper">
        <header>
            <span class="badge">\${category}</span>
            <h1>\${title}</h1>
        </header>
        <section class="main-article">\${content}</section>
    </article>
</body>
</html>`;

                const finalHTML = htmlTemplate
                    .replace(/\${title}/g, title)
                    .replace(/\${category}/g, category)
                    .replace(/\${meta}/g, meta)
                    .replace(/\${content}/g, content);

                const encoded = btoa(unescape(encodeURIComponent(finalHTML)));
                const githubURL = `https://api.github.com/repos/ArafatBook/Md-Arafat-Hosen/contents/posts/${slug}.html`;

                const res = await fetch(githubURL, {
                    method: "PUT",
                    headers: { "Authorization": "token " + GITHUB_TOKEN, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "CMS Publish: " + title, content: encoded })
                });

                if(res.ok) { 
                    alert("🚀 Success! Your post is live."); 
                    location.reload(); 
                } else { 
                    const err = await res.json();
                    alert("GitHub Error: " + err.message); 
                }

            } catch (e) { 
                alert("Critical Error: " + e.message); 
            } finally { 
                btn.innerHTML = originalContent; 
                btn.disabled = false; 
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "login.html");
        });
    </script>
</body>
</html>

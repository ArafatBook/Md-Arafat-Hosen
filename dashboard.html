<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arafat OS | Ultra CMS Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --accent: #6366f1; --bg-dark: #050505; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f8fafc; display: none; overflow-x: hidden; }
        
        .glass-panel { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Banner Style Header */
        .cover-wrapper { width: 100%; height: 350px; background: #111; position: relative; overflow: hidden; border-radius: 0 0 40px 40px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        #coverImagePreview { width: 100%; height: 100%; object-fit: cover; display: none; transition: 0.5s ease; }
        .cover-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); opacity: 0; transition: 0.3s; }
        .cover-wrapper:hover .cover-overlay { opacity: 1; }
        .cover-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed rgba(255,255,255,0.05); }

        /* Professional Editor Fixes */
        #editor { height: auto; min-height: 600px; border: none !important; color: #cbd5e1; font-size: 1.2rem; line-height: 1.8; }
        .ql-toolbar.ql-snow { border: none !important; background: transparent; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05) !important; position: sticky; top: 0; z-index: 40; backdrop-filter: blur(10px); }
        .ql-container.ql-snow { border: none !important; }
        .ql-editor.ql-blank::before { color: #475569 !important; font-style: normal; }

        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5); }
        
        input::placeholder, textarea::placeholder { color: #334155; }
    </style>
</head>
<body class="min-h-screen">

    <div class="cover-wrapper" id="coverTrigger">
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <img id="coverImagePreview" src="">
        <div class="cover-placeholder" id="placeholderUI">
            <div class="w-14 h-14 bg-white/5 rounded-full flex items-center justify-center mb-4 border border-white/10">
                <i class="fas fa-camera text-slate-400"></i>
            </div>
            <p class="text-slate-500 font-medium">Add Cover Illustration</p>
        </div>
        <div class="cover-overlay">
            <button class="px-6 py-2 bg-white/10 backdrop-blur-md border border-white/20 rounded-full text-sm font-bold">Change Cover</button>
        </div>
    </div>

    <div class="max-w-[1400px] mx-auto px-6 lg:px-12">
        <div class="flex flex-col lg:flex-row gap-12 mt-12">
            
            <div class="flex-1 space-y-8">
                <div class="space-y-4">
                    <input type="text" id="postTitle" placeholder="Untitled Post" class="w-full bg-transparent text-5xl lg:text-6xl font-extrabold outline-none border-none placeholder-slate-800 tracking-tight">
                    
                    <div class="flex items-center space-x-4">
                        <span class="px-3 py-1 bg-indigo-500/10 text-indigo-400 rounded-lg text-xs font-mono">/posts/</span>
                        <input type="text" id="postSlug" placeholder="automatic-slug" class="bg-transparent text-slate-500 outline-none font-mono text-sm w-full">
                    </div>

                    <textarea id="metaDesc" placeholder="Write a brief teaser for this story..." class="w-full bg-transparent outline-none text-slate-400 resize-none h-16 text-lg border-l-2 border-slate-800 pl-4 mt-4 focus:border-indigo-500 transition-colors"></textarea>
                </div>

                <div class="editor-container mt-10">
                    <div id="editor"></div>
                </div>
            </div>

            <aside class="w-full lg:w-80 space-y-6">
                <div class="glass-panel p-8 rounded-[32px] sticky top-12 border border-white/5">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="font-bold text-slate-200">Publishing</h3>
                        <div id="readTime" class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">0 min read</div>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-3">Category</label>
                            <input type="text" id="categoryInput" list="categoryList" placeholder="Tag this post..." class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl text-sm outline-none focus:border-indigo-500 transition shadow-inner">
                            <datalist id="categoryList">
                                <option value="Web Development"><option value="Gadget Review"><option value="Video Editing">
                                <option value="Marketing Strategy"><option value="Personal Blog">
                            </datalist>
                        </div>

                        <div class="pt-4 space-y-3">
                            <button id="publishBtn" class="w-full btn-primary text-white font-bold py-5 rounded-2xl shadow-xl flex items-center justify-center space-x-2">
                                <i class="fas fa-paper-plane text-sm"></i>
                                <span>PUBLISH LIVE</span>
                            </button>
                            
                            <button onclick="location.reload()" class="w-full bg-white/5 hover:bg-white/10 text-slate-400 py-4 rounded-2xl text-sm font-medium transition">
                                Save Draft
                            </button>
                        </div>
                    </div>

                    <div class="mt-8 pt-8 border-t border-white/5 flex flex-col items-center">
                        <button onclick="localStorage.removeItem('my_gh_token'); location.reload();" class="text-[10px] font-bold text-slate-600 hover:text-indigo-400 transition uppercase tracking-tighter">Update Github Token</button>
                        <button id="logoutBtn" class="mt-4 text-[10px] font-bold text-red-900/50 hover:text-red-500 transition uppercase">Sign Out</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U",
            authDomain: "md-arafat-hosen.firebaseapp.com",
            projectId: "md-arafat-hosen",
            storageBucket: "md-arafat-hosen.firebasestorage.app",
            appId: "1:170687583576:web:ebffeccc9f6ead20cd412d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        onAuthStateChanged(auth, (user) => { 
            if (user) document.body.style.display = "block"; 
            else window.location.href = "login.html"; 
        });

        // Cover Image Handling
        const coverTrigger = document.getElementById('coverTrigger');
        const fileInput = document.getElementById('fileInput');
        const coverImagePreview = document.getElementById('coverImagePreview');
        const placeholderUI = document.getElementById('placeholderUI');
        let selectedFile = null;

        coverTrigger.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (re) => {
                    coverImagePreview.src = re.target.result;
                    coverImagePreview.style.display = 'block';
                    placeholderUI.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // Slug Logic
        document.getElementById('postTitle').addEventListener('input', (e) => {
            document.getElementById('postSlug').value = e.target.value.toLowerCase().trim().replace(/ /g, '-').replace(/[^\w-]+/g, '');
        });

        // Editor Initialization
        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Tell your story...',
            modules: {
                imageResize: { displaySize: true },
                toolbar: [
                    [{ 'header': [1, 2, false] }],
                    ['bold', 'italic', 'underline', 'blockquote'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        quill.on('text-change', () => {
            const text = quill.getText();
            const words = text.trim().split(/\s+/).length;
            const time = Math.ceil(words / 200);
            document.getElementById('readTime').innerText = `${time} min read`;
        });

        // Publish Live Logic
        document.getElementById('publishBtn').addEventListener('click', async () => {
            const title = document.getElementById('postTitle').value;
            const slug = document.getElementById('postSlug').value;
            const meta = document.getElementById('metaDesc').value;
            const category = document.getElementById('categoryInput').value || "General";
            const content = quill.root.innerHTML;

            if(!title || !selectedFile) return alert("Please add a title and cover image.");

            let GITHUB_TOKEN = localStorage.getItem('my_gh_token');
            if (!GITHUB_TOKEN) {
                GITHUB_TOKEN = prompt("Enter GitHub Personal Access Token:");
                if (GITHUB_TOKEN) localStorage.setItem('my_gh_token', GITHUB_TOKEN); else return;
            }

            const btn = document.getElementById('publishBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> <span>DEPLOYING...</span>';
            btn.disabled = true;

            try {
                // 1. Firebase Storage
                const storageRef = ref(storage, 'covers/' + Date.now() + "_" + selectedFile.name);
                const snapshot = await uploadBytes(storageRef, selectedFile);
                const imageURL = await getDownloadURL(snapshot.ref);

                // 2. Firebase Database
                await addDoc(collection(db, "blogs"), { title, slug, category, image: imageURL, timestamp: serverTimestamp() });

                // 3. GitHub Deployment
                const htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>\${title} | Md Arafat Hosen</title>
    <meta name="description" content="\${meta}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="post-template">
    <header><div class="container nav-container"><a href="../index.html" class="logo">Md Arafat Hosen</a><nav><ul class="nav-links"><li><a href="../index.html">Home</a></li><li><a href="../blog.html">Blog</a></li></ul></nav></div></header>
    <div class="post-hero" style="background-image: url('\${imageURL}');"></div>
    <main class="container post-content">
        <span class="category-label">\${category}</span>
        <h1 class="entry-title">\${title}</h1>
        <article>\${content}</article>
    </main>
</body>
</html>`;

                const finalHTML = htmlContent
                    .replace(/\${title}/g, title).replace(/\${category}/g, category).replace(/\${meta}/g, meta)
                    .replace(/\${imageURL}/g, imageURL).replace(/\${content}/g, content);

                const encoded = btoa(unescape(encodeURIComponent(finalHTML)));
                const githubURL = `https://api.github.com/repos/ArafatBook/Md-Arafat-Hosen/contents/posts/${slug}.html`;

                const res = await fetch(githubURL, {
                    method: "PUT",
                    headers: { "Authorization": "token " + GITHUB_TOKEN, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "New Post: " + title, content: encoded })
                });

                if(res.ok) {
                    alert("✨ Successfully published to your live site!");
                    location.reload();
                } else {
                    const err = await res.json();
                    alert("GitHub Error: " + err.message);
                }

            } catch (e) {
                alert("Critical Error: " + e.message);
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "login.html");
        });
    </script>
</body>
</html>

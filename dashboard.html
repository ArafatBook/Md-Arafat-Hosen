<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arafat OS | Ultra CMS Pro v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        :root { --accent: #8b5cf6; --bg-dark: #020617; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-dark); color: #f8fafc; display: none; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #editor { height: 450px; background: #0f172a; border: none !important; color: #e2e8f0; font-size: 17px; padding: 20px; border-radius: 0 0 24px 24px; }
        .ql-toolbar { background: #1e293b !important; border: none !important; border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 24px 24px 0 0; }
        .ql-snow .ql-stroke { stroke: #94a3b8 !important; }
        .ql-snow .ql-fill { fill: #94a3b8 !important; }
        .ql-snow .ql-picker { color: #94a3b8 !important; }
        .tab-btn.active { background: rgba(139, 92, 246, 0.2); color: #a78bfa; border-color: #8b5cf6; }
        .media-card:hover .media-overlay { opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex">

    <aside class="fixed w-64 h-screen glass-panel border-r border-slate-800 hidden lg:flex flex-col z-50">
        <div class="p-8"><h1 class="text-xl font-black text-white">ARAFAT<span class="text-indigo-500">.OS</span></h1></div>
        <nav class="flex-1 px-4 space-y-2">
            <button onclick="switchTab('editor-section')" class="tab-btn active w-full flex items-center p-4 rounded-xl text-slate-400 hover:text-white transition border border-transparent"><i class="fas fa-pen-nib mr-3"></i> Editor</button>
            <button onclick="switchTab('manage-section')" class="tab-btn w-full flex items-center p-4 rounded-xl text-slate-400 hover:text-white transition border border-transparent"><i class="fas fa-tasks mr-3"></i> Management</button>
            <button onclick="switchTab('media-section')" class="tab-btn w-full flex items-center p-4 rounded-xl text-slate-400 hover:text-white transition border border-transparent"><i class="fas fa-images mr-3"></i> Media Library</button>
        </nav>
        <div class="p-6"><button id="logoutBtn" class="w-full p-4 rounded-xl bg-red-500/10 text-red-400 text-xs font-bold hover:bg-red-500 hover:text-white transition">Sign Out</button></div>
    </aside>

    <main class="lg:ml-64 flex-1 p-6 lg:p-10 w-full overflow-y-auto">
        
        <section id="editor-section" class="tab-content space-y-8">
            <header class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold">New Publication</h2>
                <div class="glass-panel px-4 py-2 rounded-xl text-indigo-400 font-bold text-sm" id="readTime">0 min read</div>
            </header>

            <div class="grid grid-cols-1 xl:grid-cols-4 gap-8">
                <div class="xl:col-span-3 space-y-6">
                    <div class="glass-panel p-8 rounded-[32px]">
                        <input type="text" id="postTitle" placeholder="Catchy Title..." class="w-full bg-transparent text-4xl font-bold outline-none border-none placeholder-slate-800">
                        <div class="flex items-center mt-4 bg-black/20 w-fit px-3 py-1 rounded-lg border border-white/5">
                            <span class="text-slate-600 text-[10px] font-mono mr-2">SLUG:</span>
                            <input type="text" id="postSlug" class="bg-transparent text-indigo-400 outline-none font-mono text-[10px] w-48">
                        </div>
                    </div>
                    <div class="editor-wrapper rounded-[24px] overflow-hidden"><div id="editor"></div></div>
                </div>
                <div class="xl:col-span-1 space-y-6">
                    <div class="glass-panel p-6 rounded-[32px] sticky top-6">
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-4">Post Category</label>
                        <input type="text" id="categoryInput" list="categoryList" placeholder="Select..." class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl text-sm outline-none focus:border-indigo-500 mb-6">
                        <datalist id="categoryList"><option value="Web Dev"><option value="Tech"><option value="Marketing"></datalist>
                        
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2">Meta Desc</label>
                        <textarea id="metaDesc" class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl text-xs outline-none h-20 mb-6"></textarea>

                        <button id="publishBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95"><i class="fas fa-rocket mr-2"></i> PUBLISH</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="manage-section" class="tab-content hidden space-y-8">
            <h2 class="text-3xl font-bold mb-8">Manage Publications</h2>
            <div class="glass-panel rounded-[32px] overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-900/50 text-slate-500 text-[10px] uppercase tracking-widest">
                        <tr>
                            <th class="p-6">Title</th>
                            <th class="p-6">Category</th>
                            <th class="p-6 text-center">Views</th>
                            <th class="p-6 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="postTableBody" class="text-sm">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="media-section" class="tab-content hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-bold">Media Library</h2>
                <input type="file" id="mediaUpload" class="hidden" accept="image/*">
                <button onclick="document.getElementById('mediaUpload').click()" class="bg-indigo-600 p-3 px-6 rounded-xl font-bold text-sm hover:bg-indigo-500 transition"><i class="fas fa-plus mr-2"></i> Upload New</button>
            </div>
            <div id="mediaGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                </div>
        </section>

    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U", authDomain: "md-arafat-hosen.firebaseapp.com", projectId: "md-arafat-hosen", storageBucket: "md-arafat-hosen.firebasestorage.app" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        onAuthStateChanged(auth, (user) => { if (user) { document.body.style.display = "flex"; loadPosts(); loadMedia(); } else window.location.href = "login.html"; });

        // Navigation Logic
        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // Editor Logic
        var quill = new Quill('#editor', { theme: 'snow', modules: { imageResize: { displaySize: true }, toolbar: [[{ 'header': [1, 2, false] }], ['bold', 'italic', 'underline'], [{ 'align': [] }], ['link', 'image', 'video'], ['clean']] } });
        document.getElementById('postTitle').addEventListener('input', (e) => { document.getElementById('postSlug').value = e.target.value.toLowerCase().trim().replace(/ /g, '-').replace(/[^\w-]+/g, ''); });

        // Load Posts Table
        async function loadPosts() {
            const q = query(collection(db, "blogs"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            const tbody = document.getElementById('postTableBody');
            tbody.innerHTML = '';
            snap.forEach(blogDoc => {
                const data = blogDoc.data();
                tbody.innerHTML += `
                    <tr class="border-t border-slate-800/50 hover:bg-white/5 transition">
                        <td class="p-6 font-semibold">${data.title}</td>
                        <td class="p-6 text-slate-400">${data.category}</td>
                        <td class="p-6 text-center font-mono text-indigo-400">${data.views || 0}</td>
                        <td class="p-6 text-right space-x-3">
                            <button onclick="window.deletePost('${blogDoc.id}', '${data.slug}')" class="text-red-500 hover:text-red-400"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        // Delete Logic
        window.deletePost = async (id, slug) => {
            if(!confirm("Are you sure? This will remove it from Database (GitHub file must be deleted manually).")) return;
            await deleteDoc(doc(db, "blogs", id));
            loadPosts();
        };

        // Media Library Logic
        async function loadMedia() {
            const listRef = ref(storage, 'media/');
            const res = await listAll(listRef);
            const grid = document.getElementById('mediaGrid');
            grid.innerHTML = '';
            res.items.forEach(async (itemRef) => {
                const url = await getDownloadURL(itemRef);
                grid.innerHTML += `
                    <div class="relative group aspect-square rounded-xl overflow-hidden glass-panel border border-white/10">
                        <img src="${url}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-indigo-600/80 opacity-0 group-hover:opacity-100 transition flex flex-col items-center justify-center p-2 text-center">
                            <button onclick="navigator.clipboard.writeText('${url}'); alert('URL Copied!')" class="bg-white text-indigo-600 px-3 py-1 rounded-lg text-[10px] font-bold mb-2">COPY URL</button>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('mediaUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const sRef = ref(storage, 'media/' + Date.now() + "_" + file.name);
            await uploadBytes(sRef, file);
            loadMedia();
        });

        // Publish Logic (Same as before but linked to loadPosts)
        document.getElementById('publishBtn').addEventListener('click', async () => {
            const title = document.getElementById('postTitle').value;
            const slug = document.getElementById('postSlug').value;
            const content = quill.root.innerHTML;
            const category = document.getElementById('categoryInput').value || "General";

            if(!title || !slug) return alert("Fill all fields");

            let token = localStorage.getItem('my_gh_token') || prompt("GitHub Token:");
            if(token) localStorage.setItem('my_gh_token', token); else return;

            const btn = document.getElementById('publishBtn');
            btn.innerText = "DEPLOYING...";
            btn.disabled = true;

            try {
                // 1. Save to Firebase with 0 initial views
                await addDoc(collection(db, "blogs"), { title, slug, category, views: 0, timestamp: serverTimestamp() });
                
                // 2. GitHub Push (Using the template from previous code)
                const finalHTML = `<!DOCTYPE html><html><head><title>${title}</title><link rel="stylesheet" href="../style.css"></head><body><article>${content}</article></body></html>`;
                const encoded = btoa(unescape(encodeURIComponent(finalHTML)));
                await fetch(`https://api.github.com/repos/ArafatBook/Md-Arafat-Hosen/contents/posts/${slug}.html`, {
                    method: "PUT",
                    headers: { "Authorization": "token " + token, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "CMS: " + title, content: encoded })
                });

                alert("🚀 Published!");
                location.reload();
            } catch (e) { alert(e.message); }
            finally { btn.innerText = "PUBLISH"; btn.disabled = false; }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => window.location.href = "login.html"));
    </script>
</body>
</html>

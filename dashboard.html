        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        :root { --accent: #8b5cf6; --bg-dark: #020617; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-dark); color: #f8fafc; display: none; overflow-x: hidden; }

<body class="min-h-screen flex flex-col lg:flex-row">

    <header class="lg:hidden flex items-center justify-between p-4 glass-panel sticky top-0 z-[60]">
        <button onclick="toggleMobileMenu()" class="text-2xl text-slate-400 p-2"><i class="fas fa-ellipsis-v"></i></button>
        <h1 class="text-lg font-black tracking-tighter uppercase">Arafat<span class="text-indigo-500">.OS</span></h1>
        <div class="w-10"></div> </header>

    <aside id="mobileSidebar" class="fixed inset-y-0 left-0 w-64 glass-panel border-r border-slate-800 flex flex-col z-[100] lg:translate-x-0 lg:static">
        <div class="p-8 text-center hidden lg:block">
            <h1 class="text-xl font-black text-white tracking-widest uppercase">Arafat<span class="text-indigo-500">.OS</span></h1>
            <p class="text-[9px] text-slate-500 font-bold mt-1 uppercase">v5.5 Stable</p>
        </div>
        
        <div class="lg:hidden p-6 flex justify-end">
            <button onclick="toggleMobileMenu()" class="text-slate-500 text-xl">&times;</button>
        </div>

        <nav class="flex-1 px-4 space-y-2">
            <button onclick="switchTab('editor-tab')" id="btn-editor-tab" class="sidebar-btn active w-full flex items-center p-4 rounded-xl text-slate-400 transition"><i class="fas fa-edit mr-3"></i> Write</button>
            <button onclick="switchTab('posts-tab')" id="btn-posts-tab" class="sidebar-btn w-full flex items-center p-4 rounded-xl text-slate-400 transition"><i class="fas fa-folder mr-3"></i> Content</button>
            <button onclick="switchTab('media-tab')" id="btn-media-tab" class="sidebar-btn w-full flex items-center p-4 rounded-xl text-slate-400 transition"><i class="fas fa-images mr-3"></i> Assets</button>
            <button onclick="switchTab('github-tab')" id="btn-github-tab" class="sidebar-btn w-full flex items-center p-4 rounded-xl text-slate-400 transition"><i class="fab fa-github mr-3"></i> Sync</button>
        </nav>

        <div class="p-6">
            <button id="logoutBtn" class="w-full p-4 rounded-xl bg-red-500/10 text-red-400 text-xs font-bold hover:bg-red-500 hover:text-white transition">Sign Out</button>
        </div>
    </aside>

    <main class="flex-1 p-4 lg:p-10 w-full overflow-y-auto">
        
        <section id="editor-tab" class="tab-content space-y-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h2 class="text-2xl font-bold" id="mainHeader">Forge Content</h2>
                <div class="flex gap-2">
                    <button onclick="openPreview()" class="flex-1 md:flex-none bg-slate-800 py-2 px-6 rounded-xl text-xs font-bold">PREVIEW</button>
                    <button onclick="clearEditor()" class="flex-1 md:flex-none bg-red-500/10 text-red-500 py-2 px-6 rounded-xl text-xs font-bold">NEW</button>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
                <div class="xl:col-span-3 space-y-6">
                    <div class="glass-panel p-6 rounded-[32px]">
                        <input type="hidden" id="editDocId">
                        <input type="text" id="postTitle" placeholder="Post Title..." class="w-full bg-transparent text-3xl font-bold outline-none border-none placeholder-slate-800">
                        <input type="text" id="postSlug" placeholder="url-slug-here" class="bg-transparent text-indigo-400 text-xs font-mono border-none outline-none mt-2 w-full">
                    </div>
                    <div class="shadow-2xl rounded-3xl overflow-hidden"><div id="editor"></div></div>
                </div>

                <div class="xl:col-span-1 space-y-6">
                    <div class="glass-panel p-6 rounded-[32px] space-y-6">
                        <div>
                            <label class="text-[10px] text-slate-500 font-bold uppercase block mb-2">Meta Description</label>
                            <textarea id="metaInput" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-xs outline-none h-32 resize-none"></textarea>
                        </div>
                        <div class="space-y-3">
                            <button id="publishBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 font-bold py-4 rounded-2xl transition shadow-xl flex items-center justify-center gap-2">
                                <i class="fas fa-rocket text-xs"></i> PUBLISH LIVE
                            </button>
                            <button id="draftBtn" class="w-full bg-slate-800 text-slate-400 font-bold py-3 rounded-2xl text-xs">SAVE AS DRAFT</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="posts-tab" class="tab-content hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold">Inventory</h2>
                <button onclick="bulkDel()" id="bulkBtn" class="hidden bg-red-600 px-6 py-2 rounded-xl text-xs font-bold">DELETE SELECTED</button>
            </div>
            <div class="glass-panel rounded-[32px] overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-900 text-slate-500 text-[10px] font-bold uppercase border-b border-white/5">
                        <tr>
                            <th class="p-6 w-10"><input type="checkbox" id="masterCheck"></th>
                            <th class="p-6">Content</th>
                            <th class="p-6">Status</th>
                            <th class="p-6 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="postTable" class="text-sm divide-y divide-white/5"></tbody>
                </table>
            </div>
        </section>

        <section id="media-tab" class="tab-content hidden space-y-6">
            <h2 class="text-2xl font-bold">Media Library</h2>
            <div id="mediaGrid" class="grid grid-cols-2 md:grid-cols-6 gap-4"></div>
        </section>

        <section id="github-tab" class="tab-content hidden space-y-6">
            <h2 class="text-2xl font-bold">Cloud Sync</h2>
            <div class="glass-panel p-8 rounded-[32px] max-w-xl">
                <div class="space-y-4">
                    <input type="password" id="ghToken" placeholder="GitHub Access Token" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none">
                    <input type="text" id="ghRepo" placeholder="Username/RepoName" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none">
                    <button onclick="saveCloud()" class="bg-indigo-600 px-8 py-3 rounded-2xl font-bold">Save Sync Config</button>
                </div>
            </div>
        </section>
    </main>

    <div id="installToast" class="w-80 glass-panel p-5 rounded-3xl shadow-2xl border-indigo-500/50 flex flex-col items-center text-center">
        <div class="bg-indigo-500 w-12 h-12 rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-indigo-500/40">
            <i class="fas fa-mobile-alt text-2xl"></i>
        </div>
        <h3 class="font-bold text-sm">Install Arafat OS?</h3>
        <p class="text-[10px] text-slate-400 my-2">Add this CMS to your home screen for a faster app-like experience.</p>
        <div class="flex gap-2 w-full mt-2">
            <button id="btnInstall" class="flex-1 bg-indigo-600 py-2 rounded-xl text-[10px] font-bold">INSTALL NOW</button>
            <button onclick="closeToast()" class="flex-1 bg-slate-800 py-2 rounded-xl text-[10px] font-bold">LATER</button>
        </div>
    </div>

    <div id="previewModal" class="hidden">
        <div class="max-w-4xl mx-auto bg-white text-black p-8 lg:p-16 rounded-[48px] relative">
            <button onclick="closePreview()" class="absolute top-6 right-6 text-slate-400 text-2xl">&times;</button>
            <h1 id="pvTitle" class="text-4xl font-black mb-6"></h1>
            <div id="pvContent" class="prose prose-indigo max-w-none"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, listAll, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U", 
            authDomain: "md-arafat-hosen.firebaseapp.com", 
            projectId: "md-arafat-hosen", 
            storageBucket: "md-arafat-hosen.firebasestorage.app" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        onAuthStateChanged(auth, (user) => { 
            if (user) { 
                document.body.style.display = "flex"; 
                initCMS();
            } else { window.location.href = "login.html"; }
        });

        // --- PWA INSTALL LOGIC (Notification for 1st time) ---
        let deferredPrompt;
        const installToast = document.getElementById('installToast');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Check if user has seen this before in this session
            if (!sessionStorage.getItem('installShown')) {
                installToast.style.display = 'block';
                sessionStorage.setItem('installShown', 'true');
            }
        });

        document.getElementById('btnInstall').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                installToast.style.display = 'none';
            }
        });

        window.closeToast = () => installToast.style.display = 'none';

        // --- MOBILE MENU ---
        window.toggleMobileMenu = () => {
            document.getElementById('mobileSidebar').classList.toggle('open');
        };

        // --- TAB SYSTEM ---
        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            if(window.innerWidth < 1024) toggleMobileMenu();
            if(id === 'media-tab') loadMedia();
        };

        // --- QUILL CMS SETUP ---
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                imageResize: { displaySize: true },
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline'],
                    [{'align': []}, {'color': []}],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        // Image Upload Logic
        quill.getModule('toolbar').addHandler('image', () => {
            const fileInput = document.createElement('input');
            fileInput.setAttribute('type', 'file');
            fileInput.setAttribute('accept', 'image/*');
            fileInput.click();
            fileInput.onchange = async () => {
                const file = fileInput.files[0];
                const range = quill.getSelection(true);
                const sRef = ref(storage, 'v5_assets/' + Date.now() + "_" + file.name);
                try {
                    const snap = await uploadBytes(sRef, file);
                    const url = await getDownloadURL(snap.ref);
                    quill.insertEmbed(range.index, 'image', url);
                } catch(e) { alert("Upload Failed"); }
            };
        });

        // --- CORE FUNCTIONS ---
        async function initCMS() {
            loadPosts();
            restoreDraft();
            setInterval(autoSave, 20000);
        }

        async function savePost(status) {
            const id = document.getElementById('editDocId').value;
            const data = {
                title: document.getElementById('postTitle').value,
                slug: document.getElementById('postSlug').value || Date.now().toString(),
                content: quill.root.innerHTML,
                meta: document.getElementById('metaInput').value,
                status: status,
                timestamp: serverTimestamp()
            };
            try {
                if(id) await updateDoc(doc(db, "blogs", id), data);
                else await addDoc(collection(db, "blogs"), data);
                localStorage.removeItem('arafat_v55_draft');
                alert("Saved!");
                location.reload();
            } catch(e) { alert(e.message); }
        }

        async function loadPosts() {
            const q = query(collection(db, "blogs"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            const table = document.getElementById('postTable');
            table.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                table.innerHTML += `
                    <tr class="hover:bg-white/5 transition">
                        <td class="p-6"><input type="checkbox" value="${d.id}" class="post-cb accent-indigo-500" onchange="checkBulk()"></td>
                        <td class="p-6"><div class="font-bold text-slate-200">${p.title}</div><div class="text-[10px] text-slate-500 font-mono">${p.slug}</div></td>
                        <td class="p-6"><span class="px-2 py-1 rounded text-[8px] font-black uppercase bg-indigo-500/10 text-indigo-400">${p.status}</span></td>
                        <td class="p-6 text-right space-x-3">
                            <button onclick="editPost('${d.id}')" class="text-indigo-400"><i class="fas fa-edit"></i></button>
                            <button onclick="delSingle('${d.id}')" class="text-slate-600"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        window.editPost = async (id) => {
            const snap = await getDoc(doc(db, "blogs", id));
            const p = snap.data();
            document.getElementById('editDocId').value = id;
            document.getElementById('postTitle').value = p.title;
            document.getElementById('postSlug').value = p.slug;
            document.getElementById('metaInput').value = p.meta;
            quill.root.innerHTML = p.content;
            document.getElementById('mainHeader').innerText = "Update Content";
            switchTab('editor-tab');
        };

        window.delSingle = async (id) => { if(confirm("Delete?")) { await deleteDoc(doc(db, "blogs", id)); loadPosts(); } };

        function autoSave() {
            if(!document.getElementById('editDocId').value) {
                const draft = {
                    title: document.getElementById('postTitle').value,
                    slug: document.getElementById('postSlug').value,
                    content: quill.root.innerHTML,
                    meta: document.getElementById('metaInput').value
                };
                localStorage.setItem('arafat_v55_draft', JSON.stringify(draft));
            }
        }

        function restoreDraft() {
            const saved = localStorage.getItem('arafat_v55_draft');
            if(saved && !document.getElementById('editDocId').value) {
                const d = JSON.parse(saved);
                document.getElementById('postTitle').value = d.title || "";
                document.getElementById('postSlug').value = d.slug || "";
                document.getElementById('metaInput').value = d.meta || "";
                quill.root.innerHTML = d.content || "";
            }
        }

        window.clearEditor = () => {
            if(confirm("New Post?")) { localStorage.removeItem('arafat_v55_draft'); location.reload(); }
        };

        // UI Helpers
        window.openPreview = () => {
            document.getElementById('pvTitle').innerText = document.getElementById('postTitle').value;
            document.getElementById('pvContent').innerHTML = quill.root.innerHTML;
            document.getElementById('previewModal').classList.remove('hidden');
        };
        window.closePreview = () => document.getElementById('previewModal').classList.add('hidden');

        document.getElementById('postTitle').oninput = (e) => {
            document.getElementById('postSlug').value = e.target.value.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
        };

        window.checkBulk = () => {
            const count = document.querySelectorAll('.post-cb:checked').length;
            document.getElementById('bulkBtn').style.display = count > 0 ? 'block' : 'none';
        };

        window.bulkDel = async () => {
            const selected = document.querySelectorAll('.post-cb:checked');
            if(confirm(`Delete ${selected.l

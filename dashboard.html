<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arafat OS | Ultra CMS v6.0</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        :root { --accent: #8b5cf6; --bg-dark: #020617; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-dark); color: #f8fafc; overflow-x: hidden; }
        
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-btn.active { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border-left: 4px solid #8b5cf6; }
        
        /* Sidebar Mobile Animation */
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .sidebar-hide { transform: translateX(-100%); }
        .sidebar-show { transform: translateX(0); }

        /* Editor Customization */
        #editor { min-height: 450px; background: #0f172a; border: none !important; color: #e2e8f0; font-size: 16px; border-radius: 0 0 24px 24px; }
        .ql-toolbar { background: #1e293b !important; border: none !important; border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 24px 24px 0 0; }

        /* SEO Box */
        .seo-box { background: white; color: #4d5156; padding: 15px; border-radius: 12px; font-family: arial; border: 1px solid #dfe1e5; }
        
        /* Install Popup */
        #installNotice { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 95%; max-width: 400px; }
        
        /* Preview Modal */
        #prevModal { z-index: 2000; }
    </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row">

    <header class="lg:hidden flex items-center justify-between p-4 glass sticky top-0 z-[110]">
        <button id="menuToggle" class="text-2xl text-slate-300 w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10">
            <i class="fas fa-ellipsis-v"></i>
        </button>
        <h1 class="text-xl font-bold uppercase">Arafat<span class="text-indigo-500">.OS</span></h1>
        <div class="w-10"></div>
    </header>

    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 glass border-r border-slate-800 flex flex-col sidebar-hide lg:sidebar-show">
        <div class="p-10 text-center hidden lg:block">
            <h1 class="text-2xl font-black text-white uppercase tracking-widest">Arafat<span class="text-indigo-500">.OS</span></h1>
            <p class="text-[10px] text-slate-500 font-bold mt-2 uppercase">v6.0 Ultimate</p>
        </div>

        <nav class="flex-1 px-6 space-y-2 mt-10 lg:mt-0">
            <button onclick="tabNav('editor-tab')" id="tab-editor-tab" class="sidebar-btn active w-full flex items-center p-4 rounded-2xl text-slate-400 transition"><i class="fas fa-feather mr-4"></i> Create Post</button>
            <button onclick="tabNav('posts-tab')" id="tab-posts-tab" class="sidebar-btn w-full flex items-center p-4 rounded-2xl text-slate-400 transition"><i class="fas fa-layer-group mr-4"></i> Manager</button>
            <button onclick="tabNav('media-tab')" id="tab-media-tab" class="sidebar-btn w-full flex items-center p-4 rounded-2xl text-slate-400 transition"><i class="fas fa-photo-film mr-4"></i> Media Library</button>
            <button onclick="tabNav('github-tab')" id="tab-github-tab" class="sidebar-btn w-full flex items-center p-4 rounded-2xl text-slate-400 transition"><i class="fab fa-github mr-4"></i> Cloud Sync</button>
        </nav>

        <div class="p-8">
            <div id="saveStatus" class="text-[10px] text-indigo-400 font-bold text-center uppercase opacity-0 mb-4 transition">Draft Saved</div>
            <button id="signOutBtn" class="w-full p-4 rounded-2xl bg-red-500/10 text-red-500 text-xs font-bold uppercase tracking-widest hover:bg-red-500 hover:text-white transition">Sign Out</button>
        </div>
    </aside>

    <main class="flex-1 p-5 lg:p-12 w-full overflow-y-auto">
        
        <section id="editor-tab" class="tab-view space-y-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <h2 class="text-3xl font-bold" id="actionLabel">New Content</h2>
                <div class="flex gap-3">
                    <button onclick="viewPreview()" class="flex-1 md:flex-none bg-slate-800 py-3 px-8 rounded-2xl text-xs font-bold uppercase hover:bg-slate-700 transition">Preview</button>
                    <button onclick="createNew()" class="flex-1 md:flex-none bg-red-500/10 text-red-500 py-3 px-8 rounded-2xl text-xs font-bold uppercase hover:bg-red-500 hover:text-white transition">New Post</button>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-4 gap-8">
                <div class="xl:col-span-3 space-y-6">
                    <div class="glass p-8 rounded-[40px]">
                        <input type="hidden" id="editId">
                        <input type="text" id="pTitle" placeholder="Post Title..." class="w-full bg-transparent text-4xl font-bold outline-none border-none placeholder-slate-800">
                        <div class="flex items-center gap-2 mt-4 text-xs font-mono text-indigo-400">
                            <span class="text-slate-600">URL:</span>
                            <input type="text" id="pSlug" placeholder="url-slug" class="bg-transparent border-none outline-none w-full">
                        </div>
                    </div>
                    <div class="shadow-2xl rounded-[32px] overflow-hidden"><div id="editor"></div></div>
                    
                    <div class="glass p-8 rounded-[32px] border-l-8 border-indigo-500">
                        <h4 class="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest">Google Preview</h4>
                        <div class="seo-box">
                            <div class="text-[14px] text-[#202124] mb-1">mdarafathosen.top › <span id="seoSlug">slug</span></div>
                            <div class="text-[20px] text-[#1a0dab] hover:underline cursor-pointer" id="seoTitle">Post Title Preview</div>
                            <div class="text-[14px] leading-relaxed mt-1" id="seoDesc">SEO description preview here.</div>
                        </div>
                    </div>
                </div>

                <div class="xl:col-span-1 space-y-6">
                    <div class="glass p-8 rounded-[40px] sticky top-10 space-y-8">
                        <div>
                            <label class="text-[10px] text-slate-500 font-bold uppercase block mb-3">SEO Meta Description</label>
                            <textarea id="pMeta" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl text-xs outline-none h-40 resize-none focus:border-indigo-500 transition"></textarea>
                        </div>
                        <div class="space-y-4">
                            <button id="pubBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 font-bold py-5 rounded-3xl shadow-2xl transition flex items-center justify-center gap-3">
                                <i class="fas fa-paper-plane text-xs"></i> PUBLISH LIVE
                            </button>
                            <button id="draftBtn" class="w-full bg-slate-800 text-slate-400 font-bold py-4 rounded-3xl text-xs hover:bg-slate-700 transition">SAVE DRAFT</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="posts-tab" class="tab-view hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-bold">Content Manager</h2>
                <button onclick="bulkDelete()" id="bulkDel" class="hidden bg-red-600 px-8 py-3 rounded-2xl text-xs font-bold">DELETE SELECTED</button>
            </div>
            <div class="glass rounded-[40px] overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-900 text-slate-500 text-[10px] font-bold uppercase border-b border-white/5">
                        <tr>
                            <th class="p-8 w-10"><input type="checkbox" id="checkAll"></th>
                            <th class="p-8">Post Info</th>
                            <th class="p-8">Status</th>
                            <th class="p-8 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="postBody" class="text-sm divide-y divide-white/5"></tbody>
                </table>
            </div>
        </section>

        <section id="media-tab" class="tab-view hidden space-y-8">
            <h2 class="text-3xl font-bold">Media Library</h2>
            <div id="mediaWall" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </section>

        <section id="github-tab" class="tab-view hidden space-y-8">
            <h2 class="text-3xl font-bold">Cloud Sync</h2>
            <div class="glass p-10 rounded-[40px] max-w-2xl">
                <div class="space-y-6">
                    <input type="password" id="ghKey" placeholder="GitHub Token" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl outline-none">
                    <input type="text" id="ghPath" placeholder="Username/Repo" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl outline-none">
                    <button onclick="saveCloud()" class="bg-indigo-600 px-10 py-4 rounded-3xl font-bold hover:bg-indigo-500 transition">SAVE SYNC</button>
                </div>
            </div>
        </section>
    </main>

    <div id="installNotice" class="glass p-6 rounded-[32px] border-indigo-500/30 shadow-2xl">
        <div class="flex items-center gap-4 mb-4">
            <div class="bg-indigo-600 w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/20">
                <i class="fas fa-mobile-screen-button text-xl"></i>
            </div>
            <div>
                <h3 class="font-bold text-sm">Install Arafat OS?</h3>
                <p class="text-[10px] text-slate-400">আপনার ফোনে অ্যাপের মতো ব্যবহার করুন।</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button id="btnInstall" class="flex-1 bg-indigo-600 py-3 rounded-2xl text-xs font-bold">INSTALL</button>
            <button onclick="closeInstall()" class="flex-1 bg-slate-800 py-3 rounded-2xl text-xs font-bold">LATER</button>
        </div>
    </div>

    <div id="prevModal" class="fixed inset-0 bg-black/95 hidden overflow-y-auto p-5">
        <div class="max-w-4xl mx-auto bg-white text-black p-10 lg:p-20 rounded-[50px] relative">
            <button onclick="closePreview()" class="absolute top-8 right-8 text-slate-300 text-3xl hover:text-red-500">&times;</button>
            <h1 id="pvTitle" class="text-5xl font-black mb-10 text-slate-900"></h1>
            <div id="pvContent" class="prose prose-indigo prose-lg max-w-none"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, listAll, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U", 
            authDomain: "md-arafat-hosen.firebaseapp.com", 
            projectId: "md-arafat-hosen", 
            storageBucket: "md-arafat-hosen.firebasestorage.app" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        onAuthStateChanged(auth, (user) => { 
            if (user) { 
                document.body.style.display = "flex"; 
                startCMS();
            } else { window.location.href = "login.html"; }
        });

        // --- SIDEBAR & 3-DOT MENU ---
        const menuBtn = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('sidebar-hide');
            sidebar.classList.toggle('sidebar-show');
        });

        // --- PWA INSTALL SYSTEM ---
        let deferredPrompt;
        const installPopup = document.getElementById('installNotice');

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!localStorage.getItem('arafat_app_prompt_seen')) {
                installPopup.style.display = 'block';
            }
        });

        document.getElementById('btnInstall').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                installPopup.style.display = 'none';
                localStorage.setItem('arafat_app_prompt_seen', 'true');
            }
        });

        window.closeInstall = () => {
            installPopup.style.display = 'none';
            localStorage.setItem('arafat_app_prompt_seen', 'true');
        };

        // --- TAB SYSTEM ---
        window.tabNav = (id) => {
            document.querySelectorAll('.tab-view').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if(window.innerWidth < 1024) {
                sidebar.classList.add('sidebar-hide');
                sidebar.classList.remove('sidebar-show');
            }
            if(id === 'media-tab') loadMedia();
        };

        // --- EDITOR SETUP ---
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                imageResize: { displaySize: true },
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline'],
                    [{'color': []}, {'align': []}],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        // Custom Image Handler for Editor
        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();
            input.onchange = async () => {
                const file = input.files[0];
                const range = quill.getSelection(true);
                const sRef = ref(storage, 'cms_v6/' + Date.now() + "_" + file.name);
                const snap = await uploadBytes(sRef, file);
                const url = await getDownloadURL(snap.ref);
                quill.insertEmbed(range.index, 'image', url);
            };
        });

        // --- CORE FUNCTIONS ---
        async function startCMS() {
            loadPosts();
            restoreDraft();
            setInterval(autoDraft, 20000);
        }

        async function saveContent(status) {
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('pTitle').value,
                slug: document.getElementById('pSlug').value || Date.now().toString(),
                content: quill.root.innerHTML,
                meta: document.getElementById('pMeta').value,
                status: status,
                updated: serverTimestamp()
            };
            try {
                if(id) await updateDoc(doc(db, "blogs", id), data);
                else await addDoc(collection(db, "blogs"), data);
                localStorage.removeItem('arafat_v6_draft');
                alert("Success!");
                location.reload();
            } catch(e) { alert(e.message); }
        }

        async function loadPosts() {
            const q = query(collection(db, "blogs"), orderBy("updated", "desc"));
            const snap = await getDocs(q);
            const tbody = document.getElementById('postBody');
            tbody.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                tbody.innerHTML += `
                    <tr class="hover:bg-white/5 transition">
                        <td class="p-8"><input type="checkbox" value="${d.id}" class="row-cb accent-indigo-500" onchange="checkBulkState()"></td>
                        <td class="p-8 font-bold">${data.title}<br><span class="text-[9px] text-slate-600 font-mono">${data.slug}</span></td>
                        <td class="p-8 text-[10px] uppercase font-bold text-indigo-400">${data.status}</td>
                        <td class="p-8 text-right space-x-3">
                            <button onclick="editDoc('${d.id}')" class="text-indigo-400"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteDocSingle('${d.id}')" class="text-slate-600"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        window.editDoc = async (id) => {
            const snap = await getDoc(doc(db, "blogs", id));
            const data = snap.data();
            document.getElementById('editId').value = id;
            document.getElementById('pTitle').value = data.title;
            document.getElementById('pSlug').value = data.slug;
            document.getElementById('pMeta').value = data.meta;
            quill.root.innerHTML = data.content;
            document.getElementById('actionLabel').innerText = "Update Mode";
            tabNav('editor-tab');
        };

        window.deleteDocSingle = async (id) => { if(confirm("Delete?")) { await deleteDoc(doc(db, "blogs", id)); loadPosts(); } };

        function autoDraft() {
            if(!document.getElementById('editId').value) {
                const draft = {
                    title: document.getElementById('pTitle').value,
                    slug: document.getElementById('pSlug').value,
                    content: quill.root.innerHTML,
                    meta: document.getElementById('pMeta').value
                };
                localStorage.setItem('arafat_v6_draft', JSON.stringify(draft));
                document.getElementById('saveStatus').style.opacity = '1';
                setTimeout(() => document.getElementById('saveStatus').style.opacity = '0', 2000);
            }
        }

        function restoreDraft() {
            const saved = localStorage.getItem('arafat_v6_draft');
            if(saved && !document.getElementById('editId').value) {
                const d = JSON.parse(saved);
                document.getElementById('pTitle').value = d.title || "";
                document.getElementById('pSlug').value = d.slug || "";
                document.getElementById('pMeta').value = d.meta || "";
                quill.root.innerHTML = d.content || "";
            }
        }

        window.createNew = () => { if(confirm("New Post?")) { localStorage.removeItem('arafat_v6_draft'); location.reload(); } };

        window.viewPreview = () => {
            document.getElementById('pvTitle').innerText = document.getElementById('pTitle').value || "Untitled";
            document.getElementById('pvContent').innerHTML = quill.root.innerHTML;
            document.getElementById('prevModal').classList.remove('hidden');
        };
        window.closePreview = () => document.getElementById('prevModal').classList.add('hidden');

        // SEO Realtime Sync
        document.getElementById('pTitle').oninput = (e) => {
            document.getElementById('seoTitle').innerText = e.target.value || "Post Title Preview";
            document.getElementById('pSlug').value = e.target.value.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            document.getElementById('seoSlug').innerText = document.getElementById('pSlug').value;
        };
        document.getElementById('pMeta').oninput = (e) => {
            document.getElementById('seoDesc').innerText = e.target.value || "Description preview...";
        };

        window.checkBulkState = () => {
            const len = document.querySelectorAll('.row-cb:checked').length;
            document.getElementById('bulkDel').style.display = len > 0 ? 'block' : 'none';
        };

        window.bulkDelete = async () => {
            const items = document.querySelectorAll('.row-cb:checked');
            if(confirm(`Delete ${items.length}?`)) {
                for(let i of items) await deleteDoc(doc(db, "blogs", i.value));
                loadPosts();
            }
        };

        async function loadMedia() {
            const res = await listAll(ref(storage, 'cms_v6/'));
            const wall = document.getElementById('mediaWall');
            wall.innerHTML = '';
            res.items.forEach(async (item) => {
                const url = await getDownloadURL(item);
                wall.innerHTML += `<div class="p-2 glass rounded-2xl group relative"><img src="${url}" class="w-full aspect-square object-cover rounded-xl"><button onclick="navigator.clipboard.writeText('${url}');alert('Copied')" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition rounded-xl flex items-center justify-center text-[10px] font-bold">Copy URL</button></div>`;
            });
        }

        window.saveCloud = () => {
            localStorage.setItem('gh_token', document.getElementById('ghKey').value);
            localStorage.setItem('gh_repo', document.getElementById('ghPath').value);
            alert("Config Saved!");
        };

        document.getElementById('pubBtn').onclick = () => saveContent('Live');
        document.getElementById('draftBtn').onclick = () => saveContent('Draft');
        document.getElementById('signOutBtn').onclick = () => signOut(auth).then(() => location.reload());
        document.getElementById('checkAll').onchange = (e) => {
            document.querySelectorAll('.row-cb').forEach(c => c.checked = e.target.checked);
            checkBulkState();
        };

    </script>
</body>
</html>

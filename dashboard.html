<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arafat OS | Final Version</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Mobile Sidebar */
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 9999; }
        .sidebar-hide { transform: translateX(-100%); }
        .sidebar-show { transform: translateX(0); }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; }
        #overlay.active { display: block; }

        #editor { min-height: 400px; background: #0f172a; color: white; border: none !important; border-radius: 0 0 15px 15px; }
        .ql-toolbar { background: #1e293b !important; border: none !important; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row">

    <div id="overlay"></div>

    <header class="lg:hidden p-4 glass flex justify-between items-center sticky top-0 z-[1001]">
        <button id="menuBtn" class="text-indigo-400 text-2xl"><i class="fas fa-bars"></i></button>
        <h1 class="font-bold uppercase tracking-widest text-indigo-500">Arafat OS</h1>
        <div class="w-8"></div>
    </header>

    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-64 glass sidebar-hide lg:sidebar-show flex flex-col">
        <div class="p-8 text-center hidden lg:block">
            <h1 class="text-xl font-bold uppercase tracking-tighter text-indigo-500">Arafat OS</h1>
        </div>
        
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <button onclick="tabNav('editor-tab')" class="w-full text-left p-3 rounded-lg hover:bg-indigo-500/10 active"><i class="fas fa-pen mr-2"></i> New Post</button>
            <button onclick="tabNav('posts-tab')" class="w-full text-left p-3 rounded-lg hover:bg-indigo-500/10"><i class="fas fa-file-alt mr-2"></i> All Posts</button>
            <button onclick="tabNav('media-tab')" class="w-full text-left p-3 rounded-lg hover:bg-indigo-500/10"><i class="fas fa-images mr-2"></i> Media Library</button>
            <button onclick="tabNav('github-tab')" class="w-full text-left p-3 rounded-lg hover:bg-indigo-500/10"><i class="fab fa-github mr-2"></i> GitHub Sync</button>
            <button onclick="tabNav('settings-tab')" class="w-full text-left p-3 rounded-lg hover:bg-indigo-500/10"><i class="fas fa-cog mr-2"></i> Settings</button>
        </nav>

        <div class="p-4 border-t border-white/5">
            <button id="signOutBtn" class="w-full bg-red-500/20 text-red-500 p-2 rounded-lg text-xs font-bold uppercase">Logout</button>
        </div>
    </aside>

    <main class="flex-1 p-4 lg:p-8 overflow-y-auto h-screen w-full">
        
        <section id="editor-tab" class="tab-view space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Create Post</h2>
                <div class="flex gap-2">
                    <button id="draftBtn" class="bg-slate-800 px-4 py-2 rounded text-xs font-bold uppercase">Draft</button>
                    <button id="pubBtn" class="bg-indigo-600 px-4 py-2 rounded text-xs font-bold uppercase">Publish</button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <div class="lg:col-span-2 space-y-4">
                    <div class="glass p-4 rounded-xl">
                        <input type="hidden" id="editId">
                        <input type="text" id="pTitle" placeholder="Post Title..." class="w-full bg-transparent text-2xl font-bold outline-none border-none">
                        <input type="text" id="pSlug" placeholder="url-slug-here" class="w-full bg-transparent text-xs text-indigo-400 outline-none mt-2">
                    </div>
                    <div id="editor"></div>
                </div>

                <div class="space-y-4">
                    <div class="glass p-5 rounded-xl space-y-4">
                        <h3 class="text-xs font-bold uppercase text-slate-500">Post Settings</h3>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Category</label>
                            <select id="pCat" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-sm outline-none">
                                <option>Technology</option>
                                <option>Video Editing</option>
                                <option>Marketing</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Featured Image URL</label>
                            <input type="text" id="fImage" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-sm outline-none" placeholder="https://...">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">SEO Description</label>
                            <textarea id="pMeta" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-sm h-24 outline-none resize-none" placeholder="Short summary..."></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="posts-tab" class="tab-view hidden space-y-4">
            <h2 class="text-xl font-bold">All Posts</h2>
            <div class="glass rounded-xl overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] uppercase font-bold text-slate-400">
                        <tr><th class="p-4">Title</th><th class="p-4">Status</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="postBody" class="text-sm"></tbody>
                </table>
            </div>
        </section>

        <section id="media-tab" class="tab-view hidden"><h2 class="text-xl font-bold mb-4">Media</h2><div id="mediaWall" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div></section>
        <section id="github-tab" class="tab-view hidden"><h2 class="text-xl font-bold mb-4">GitHub</h2><div class="glass p-6 rounded-xl space-y-4 max-w-md"><input type="password" id="ghKey" placeholder="Access Token" class="w-full bg-slate-900 p-3 rounded"><button onclick="saveCloud()" class="bg-indigo-600 w-full p-3 rounded">Sync Now</button></div></section>

    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // আপনার আগের ফায়ারবেস কনফিগারেশন
        const firebaseConfig = { 
            apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U", 
            authDomain: "md-arafat-hosen.firebaseapp.com", 
            projectId: "md-arafat-hosen", 
            storageBucket: "md-arafat-hosen.firebasestorage.app" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Sidebar Toggle Logic for Mobile
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        menuBtn.onclick = () => { sidebar.classList.toggle('sidebar-hide'); sidebar.classList.toggle('sidebar-show'); overlay.classList.toggle('active'); };
        overlay.onclick = () => { sidebar.classList.add('sidebar-hide'); overlay.classList.remove('active'); };

        // Quill Editor
        var quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: [[{header:[1,2,false]},'bold','italic','link','image','video','clean']] } });

        // Tab Navigation
        window.tabNav = (id) => {
            document.querySelectorAll('.tab-view').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(window.innerWidth < 1024) { sidebar.classList.add('sidebar-hide'); overlay.classList.remove('active'); }
            if(id === 'posts-tab') loadPosts();
            if(id === 'media-tab') loadMedia();
        };

        // --- Firebase Functions (আগের সব লজিক এখানে আছে) ---
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; else loadPosts(); });

        async function saveContent(status) {
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('pTitle').value,
                slug: document.getElementById('pSlug').value,
                content: quill.root.innerHTML,
                meta: document.getElementById('pMeta').value,
                category: document.getElementById('pCat').value,
                featuredImage: document.getElementById('fImage').value,
                status: status,
                updated: serverTimestamp()
            };
            try {
                if(id) await updateDoc(doc(db, "blogs", id), data);
                else await addDoc(collection(db, "blogs"), data);
                alert("Success!"); location.reload();
            } catch(e) { alert(e.message); }
        }

        async function loadPosts() {
            const q = query(collection(db, "blogs"), orderBy("updated", "desc"));
            const snap = await getDocs(q);
            const tbody = document.getElementById('postBody');
            tbody.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                tbody.innerHTML += `<tr><td class="p-4 font-bold">${data.title}</td><td class="p-4 text-indigo-400">${data.status}</td><td class="p-4 text-right"><button onclick="editDoc('${d.id}')" class="mr-2"><i class="fas fa-edit"></i></button></td></tr>`;
            });
        }

        window.editDoc = async (id) => {
            const snap = await getDoc(doc(db, "blogs", id));
            const data = snap.data();
            document.getElementById('editId').value = id;
            document.getElementById('pTitle').value = data.title;
            document.getElementById('pSlug').value = data.slug;
            document.getElementById('pMeta').value = data.meta;
            document.getElementById('pCat').value = data.category;
            document.getElementById('fImage').value = data.featuredImage || "";
            quill.root.innerHTML = data.content;
            tabNav('editor-tab');
        };

        document.getElementById('pTitle').oninput = (e) => { document.getElementById('pSlug').value = e.target.value.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, ''); };
        document.getElementById('pubBtn').onclick = () => saveContent('Live');
        document.getElementById('draftBtn').onclick = () => saveContent('Draft');
        document.getElementById('signOutBtn').onclick = () => signOut(auth).then(()=>location.reload());
    </script>
</body>
</html>

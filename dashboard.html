<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arafat OS | Pro CMS v5.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        :root { --accent: #8b5cf6; --bg-dark: #020617; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-dark); color: #f8fafc; display: none; }
        
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-btn.active { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border-left: 4px solid #8b5cf6; }
        
        #editor { min-height: 450px; background: #0f172a; border: none !important; color: #e2e8f0; font-size: 16px; border-radius: 0 0 24px 24px; padding: 20px; }
        .ql-toolbar { background: #1e293b !important; border: none !important; border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 24px 24px 0 0; }

        /* Mobile 3-Dot Menu Style */
        #mobileMenuDropdown { display: none; position: absolute; bottom: 80px; right: 20px; width: 200px; z-index: 1000; }
        
        /* Install Notification */
        #installToast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }

        @media (max-width: 1024px) {
            .sidebar-desktop { display: none; }
            main { margin-bottom: 100px; padding: 20px; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row">

    <div id="installToast" class="glass-panel p-5 rounded-3xl border-indigo-500/50 shadow-2xl flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg">
                <i class="fas fa-rocket text-white"></i>
            </div>
            <div>
                <h4 class="text-xs font-bold">Install Arafat OS</h4>
                <p class="text-[10px] text-slate-400">Add to home screen for better experience.</p>
            </div>
        </div>
        <div class="flex flex-col gap-1">
            <button id="btnInstall" class="bg-indigo-600 text-[10px] px-4 py-2 rounded-lg font-bold">INSTALL</button>
            <button onclick="closeInstallToast()" class="text-[9px] text-slate-500 text-center uppercase">Later</button>
        </div>
    </div>

    <aside class="sidebar-desktop fixed w-64 h-screen glass-panel border-r border-slate-800 flex flex-col z-50">
        <div class="p-8 text-center">
            <h1 class="text-xl font-black text-white uppercase tracking-tighter">Arafat<span class="text-indigo-500">.OS</span></h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <button onclick="showTab('editor-tab')" id="d-editor-tab" class="sidebar-btn active w-full flex items-center p-4 rounded-xl text-slate-400 transition"><i class="fas fa-feather mr-3"></i> Editor</button>
            <button onclick="showTab('posts-tab')" id="d-posts-tab" class="sidebar-btn w-full flex items-center p-4 rounded-xl text-slate-400 transition"><i class="fas fa-layer-group mr-3"></i> Content</button>
            <button onclick="showTab('media-tab')" id="d-media-tab" class="sidebar-btn w-full flex items-center p-4 rounded-xl text-slate-400 transition"><i class="fas fa-photo-video mr-3"></i> Assets</button>
            <button onclick="showTab('github-tab')" id="d-github-tab" class="sidebar-btn w-full flex items-center p-4 rounded-xl text-slate-400 transition"><i class="fab fa-github mr-3"></i> GitHub</button>
        </nav>
        <div class="p-6">
            <button id="logoutBtn" class="w-full p-4 rounded-xl bg-red-500/10 text-red-400 text-xs font-bold hover:bg-red-500 hover:text-white transition">Sign Out</button>
        </div>
    </aside>

    <nav class="lg:hidden fixed bottom-0 w-full glass-panel border-t border-slate-800 flex justify-between items-center px-8 py-4 z-[1001]">
        <button onclick="showTab('editor-tab')" class="text-slate-400 p-2"><i class="fas fa-edit text-xl"></i></button>
        <button onclick="showTab('posts-tab')" class="text-slate-400 p-2"><i class="fas fa-list-ul text-xl"></i></button>
        <button onclick="showTab('media-tab')" class="text-slate-400 p-2"><i class="fas fa-image text-xl"></i></button>
        
        <button onclick="toggleMobileMenu()" class="text-indigo-500 p-2 bg-indigo-500/10 rounded-full w-10 h-10 flex items-center justify-center">
            <i class="fas fa-ellipsis-v"></i>
        </button>

        <div id="mobileMenuDropdown" class="glass-panel p-2 rounded-2xl shadow-2xl border border-white/10">
            <button onclick="showTab('github-tab'); toggleMobileMenu()" class="w-full text-left p-4 text-xs font-bold border-b border-white/5 flex items-center gap-3"><i class="fab fa-github text-indigo-400"></i> GitHub Settings</button>
            <button onclick="openPreview(); toggleMobileMenu()" class="w-full text-left p-4 text-xs font-bold border-b border-white/5 flex items-center gap-3"><i class="fas fa-eye text-indigo-400"></i> Live Preview</button>
            <button onclick="signOutBtn(); toggleMobileMenu()" class="w-full text-left p-4 text-xs font-bold text-red-400 flex items-center gap-3"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </nav>

    <main class="flex-1 lg:ml-64 p-4 lg:p-10 w-full overflow-y-auto pb-24">
        <section id="editor-tab" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold" id="pageTitle">Post Creation</h2>
                <div class="flex gap-2">
                    <button onclick="resetDraft()" class="hidden lg:block bg-red-500/10 text-red-500 p-2 rounded-lg text-xs font-bold px-4">CLEAR</button>
                    <button id="publishBtn" class="bg-indigo-600 px-6 py-2 rounded-xl text-xs font-bold shadow-lg shadow-indigo-500/20">PUBLISH</button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="glass-panel p-6 rounded-3xl">
                    <input type="hidden" id="editDocId">
                    <input type="text" id="postTitle" placeholder="Post Title..." class="w-full bg-transparent text-2xl lg:text-3xl font-bold outline-none border-none placeholder-slate-800">
                    <input type="text" id="postSlug" placeholder="url-slug" class="bg-transparent border-none outline-none w-full text-indigo-400 font-mono text-xs mt-1">
                </div>
                
                <div class="rounded-3xl overflow-hidden glass-panel border-none">
                    <div id="editor"></div>
                </div>

                <div class="glass-panel p-6 rounded-3xl space-y-4">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">SEO Meta Description</label>
                    <textarea id="metaInput" class="w-full bg-slate-900/50 border border-slate-800 p-4 rounded-xl text-xs outline-none h-20 resize-none"></textarea>
                </div>
            </div>
        </section>

        <section id="posts-tab" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-6">Manage Content</h2>
            <div class="glass-panel rounded-3xl overflow-hidden overflow-x-auto">
                <table class="w-full text-left">
                    <tbody id="postList" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </section>

        <section id="media-tab" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-6">Media Library</h2>
            <div id="mediaGrid" class="grid grid-cols-2 md:grid-cols-6 gap-4"></div>
        </section>

        <section id="github-tab" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-6">GitHub Config</h2>
            <div class="glass-panel p-8 rounded-3xl space-y-4">
                <input type="password" id="ghToken" placeholder="GitHub Token" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none">
                <input type="text" id="ghRepo" placeholder="Username/Repository" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none">
                <button onclick="saveGHConfig()" class="bg-indigo-600 px-8 py-3 rounded-xl font-bold">Save Changes</button>
            </div>
        </section>
    </main>

    <div id="previewModal" class="hidden fixed inset-0 bg-black/95 z-[5000] overflow-y-auto p-4 lg:p-20">
        <div class="max-w-4xl mx-auto bg-white text-black p-8 rounded-[40px]">
            <button onclick="document.getElementById('previewModal').classList.add('hidden')" class="mb-10 text-slate-400 font-bold uppercase text-xs tracking-widest flex items-center gap-2"><i class="fas fa-arrow-left"></i> Back to Editor</button>
            <h1 id="pvTitle" class="text-4xl font-black mb-8"></h1>
            <div id="pvContent" class="prose max-w-none prose-slate"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, getDoc, serverTimestamp, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U", 
            authDomain: "md-arafat-hosen.firebaseapp.com", 
            projectId: "md-arafat-hosen", 
            storageBucket: "md-arafat-hosen.firebasestorage.app" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- Auth & Session ---
        onAuthStateChanged(auth, (user) => { 
            if (user) { 
                document.body.style.display = "flex"; 
                loadPosts(); 
                checkInstallStatus();
            } else { window.location.href = "login.html"; }
        });

        // --- PWA & Install Notification Logic ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Check if user has already seen the notification
            if (!localStorage.getItem('arafat_os_installed_notified')) {
                document.getElementById('installToast').style.display = 'flex';
            }
        });

        document.getElementById('btnInstall').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    localStorage.setItem('arafat_os_installed_notified', 'true');
                    closeInstallToast();
                }
                deferredPrompt = null;
            }
        });

        window.closeInstallToast = () => {
            document.getElementById('installToast').style.display = 'none';
            // Mark as notified so it doesn't show again next time
            localStorage.setItem('arafat_os_installed_notified', 'true');
        };

        // --- UI & Navigation ---
        window.toggleMobileMenu = () => {
            const menu = document.getElementById('mobileMenuDropdown');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById('d-'+id)) document.getElementById('d-'+id).classList.add('active');
            if(id === 'media-tab') loadMedia();
        };

        // --- Editor Setup ---
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [[{'header':[1,2,false]}],['bold','italic','underline'],['link','image','video'],['clean']]
            }
        });

        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file'); input.setAttribute('accept', 'image/*');
            input.click();
            input.onchange = async () => {
                const file = input.files[0];
                const sRef = ref(storage, 'cms_v5/' + Date.now() + "_" + file.name);
                const snap = await uploadBytes(sRef, file);
                const url = await getDownloadURL(snap.ref);
                quill.insertEmbed(quill.getSelection().index, 'image', url);
            };
        });

        // --- CRUD Ops ---
        async function savePost() {
            const id = document.getElementById('editDocId').value;
            const post = {
                title: document.getElementById('postTitle').value,
                slug: document.getElementById('postSlug').value || Date.now().toString(),
                content: quill.root.innerHTML,
                meta: document.getElementById('metaInput').value,
                timestamp: serverTimestamp()
            };
            if(!post.title) return alert("Title required");
            
            try {
                if(id) await updateDoc(doc(db, "blogs", id), post);
                else await addDoc(collection(db, "blogs"), post);
                alert("Success!"); location.reload();
            } catch(e) { alert(e.message); }
        }

        window.loadPosts = async () => {
            const q = query(collection(db, "blogs"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('postList');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <tr class="hover:bg-white/5 transition">
                        <td class="p-6">
                            <div class="font-bold text-slate-200">${data.title}</div>
                            <div class="text-[10px] text-slate-500 font-mono">${data.slug}</div>
                        </td>
                        <td class="p-6 text-right space-x-4">
                            <button onclick="editPost('${d.id}')" class="text-indigo-400"><i class="fas fa-edit"></i></button>
                            <button onclick="delPost('${d.id}')" class="text-slate-600"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        };

        window.editPost = async (id) => {
            const snap = await getDoc(doc(db, "blogs", id));
            const d = snap.data();
            document.getElementById('editDocId').value = id;
            document.getElementById('postTitle').value = d.title;
            document.getElementById('postSlug').value = d.slug;
            document.getElementById('metaInput').value = d.meta;
            quill.root.innerHTML = d.content;
            showTab('editor-tab');
        };

        window.delPost = async (id) => { if(confirm("Delete?")) { await deleteDoc(doc(db, "blogs", id)); loadPosts(); } };

        window.loadMedia = async () => {
            const res = await listAll(ref(storage, 'cms_v5/'));
            const grid = document.getElementById('mediaGrid');
            grid.innerHTML = '';
            res.items.forEach(async (item) => {
                const url = await getDownloadURL(item);
                grid.innerHTML += `<div class="glass-panel p-2 rounded-xl"><img src="${url}" class="w-full aspect-square object-cover rounded-lg"></div>`;
            });
        };

        window.openPreview = () => {
            document.getElementById('pvTitle').innerText = document.getElementById('postTitle').value;
            document.getElementById('pvContent').innerHTML = quill.root.innerHTML;
            document.getElementById('previewModal').classList.remove('hidden');
        };

        window.signOutBtn = () => signOut(auth).then(() => location.reload());
        document.getElementById('publishBtn').onclick = savePost;
        document.getElementById('postTitle').oninput = (e) => {
            document.getElementById('postSlug').value = e.target.value.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
        };
    </script>
</body>
</html>

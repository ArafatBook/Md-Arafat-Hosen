<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arafat OS | Ultra CMS Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root { --accent: #8b5cf6; --bg-dark: #020617; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-dark); color: #f8fafc; display: none; overflow-x: hidden; }
        
        /* Glassmorphism Styles */
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        
        /* Advanced Editor UI */
        #editor { height: 600px; background: #0f172a; border: none !important; color: white; border-radius: 0 0 24px 24px; font-size: 18px; padding: 20px; }
        .ql-toolbar { background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 24px 24px 0 0; margin-top: 10px; }
        .ql-snow .ql-stroke { stroke: #94a3b8 !important; }
        .ql-container.ql-snow { border: 1px solid rgba(255, 255, 255, 0.05) !important; }

        /* Professional Cover Image Area */
        .cover-uploader { position: relative; width: 100%; height: 350px; background: rgba(139, 92, 246, 0.05); border: 2px dashed rgba(139, 92, 246, 0.2); border-radius: 32px; overflow: hidden; transition: 0.4s; cursor: pointer; }
        .cover-uploader:hover { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.08); }
        #imagePreview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .cover-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(2, 6, 23, 0.4); }
        .remove-img { position: absolute; top: 20px; right: 20px; background: #ef4444; color: white; width: 40px; height: 40px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 20; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="min-h-screen">

    <aside class="fixed w-72 h-screen glass-panel border-r border-slate-800 hidden lg:flex flex-col z-50">
        <div class="p-8">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent italic">Arafat CMS</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Professional OS v2.0</p>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="flex items-center p-4 rounded-2xl text-indigo-400 bg-indigo-500/10 font-semibold"><i class="fas fa-plus-circle mr-3"></i> Create Post</a>
            <a href="#" class="flex items-center p-4 rounded-2xl text-slate-400 hover:bg-slate-800/50 transition"><i class="fas fa-layer-group mr-3"></i> All Posts</a>
            <div class="h-[1px] bg-slate-800 my-4 mx-4"></div>
            <a href="#" onclick="localStorage.removeItem('my_gh_token'); location.reload();" class="flex items-center p-4 rounded-2xl text-slate-400 hover:text-yellow-400 transition text-sm"><i class="fas fa-shield-alt mr-3"></i> Update API Key</a>
        </nav>
        <div class="p-6">
            <button id="logoutBtn" class="w-full p-4 rounded-2xl bg-red-500/5 text-red-500 text-sm font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition">Sign Out</button>
        </div>
    </aside>

    <main class="lg:ml-72 p-6 md:p-12 max-w-7xl mx-auto">
        <header class="mb-10 flex flex-wrap justify-between items-center gap-4">
            <div>
                <h2 class="text-4xl font-extrabold tracking-tight text-white">Editor Studio</h2>
                <div class="flex items-center gap-3 mt-2">
                    <span class="flex items-center text-xs font-bold text-green-400 bg-green-400/10 px-3 py-1 rounded-full"><span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span> SYSTEM ONLINE</span>
                    <span id="readTime" class="text-xs font-bold text-slate-500 bg-slate-800 px-3 py-1 rounded-full">0 min read</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="publishBtn" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl shadow-[0_10px_30px_rgba(99,102,241,0.3)] transition transform active:scale-95 flex items-center">
                    <i class="fas fa-paper-plane mr-2"></i> PUBLISH LIVE
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
            <div class="xl:col-span-8 space-y-8">
                
                <div id="dropZone" class="cover-uploader group">
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                    <div id="removeImg" class="remove-img"><i class="fas fa-trash-alt"></i></div>
                    <img id="imagePreview" src="">
                    <div id="uploadPlaceholder" class="cover-overlay">
                        <div class="w-20 h-20 bg-indigo-500/10 rounded-3xl flex items-center justify-center mb-4 transition group-hover:scale-110">
                            <i class="fas fa-camera text-3xl text-indigo-400"></i>
                        </div>
                        <h3 class="text-lg font-bold text-white">Add Cover Story</h3>
                        <p class="text-slate-400 text-sm mt-1">High resolution images work best</p>
                    </div>
                </div>

                <div class="glass-panel p-10 rounded-[40px] shadow-2xl">
                    <input type="text" id="postTitle" placeholder="The Headline Goes Here..." class="w-full bg-transparent text-5xl font-black outline-none border-none placeholder-slate-800 text-white mb-6">
                    <div class="flex flex-wrap items-center gap-4 border-t border-slate-800/50 pt-6">
                        <div class="flex items-center bg-slate-900/50 px-4 py-2 rounded-xl border border-slate-800">
                            <span class="text-slate-600 text-xs font-mono mr-2">SLUG:</span>
                            <input type="text" id="postSlug" placeholder="automatic-url" class="bg-transparent text-indigo-400 outline-none font-mono text-xs w-48">
                        </div>
                    </div>
                </div>

                <div class="editor-container">
                    <div id="editor"></div>
                </div>
            </div>

            <div class="xl:col-span-4 space-y-6">
                <div class="glass-panel p-8 rounded-[32px] sticky top-12">
                    <div class="mb-8">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-[2px] block mb-4">Content Strategy</label>
                        <div class="space-y-4">
                            <div class="glass-card p-4 rounded-2xl">
                                <span class="text-xs text-slate-500 block mb-2 font-bold">Category</span>
                                <input type="text" id="categoryInput" list="categoryList" placeholder="Select..." class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-indigo-500 text-indigo-300">
                                <datalist id="categoryList">
                                    <option value="Gadget"><option value="My Blog"><option value="Mobile Phone"><option value="Video Editing"><option value="Web Development">
                                </datalist>
                            </div>
                            <div class="glass-card p-4 rounded-2xl">
                                <span class="text-xs text-slate-500 block mb-2 font-bold">Search Preview (Meta)</span>
                                <textarea id="metaDesc" placeholder="Brief summary for SEO..." class="w-full bg-transparent outline-none text-slate-400 resize-none h-24 text-xs leading-relaxed"></textarea>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-5 rounded-2xl bg-indigo-500/5 border border-indigo-500/10">
                        <p class="text-[10px] text-indigo-400 font-bold mb-2 uppercase tracking-widest">Publishing To</p>
                        <p class="text-sm text-slate-300 font-mono">/contents/posts/<span class="text-indigo-400">*</span>.html</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U",
            authDomain: "md-arafat-hosen.firebaseapp.com",
            projectId: "md-arafat-hosen",
            storageBucket: "md-arafat-hosen.firebasestorage.app",
            appId: "1:170687583576:web:ebffeccc9f6ead20cd412d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        onAuthStateChanged(auth, (user) => { 
            if (user) document.body.style.display = "block"; 
            else window.location.href = "login.html"; 
        });

        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const dropZone = document.getElementById('dropZone');
        const removeImg = document.getElementById('removeImg');
        let selectedFile = null;

        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (re) => {
                    imagePreview.src = re.target.result;
                    imagePreview.style.display = 'block';
                    removeImg.style.display = 'flex';
                    uploadPlaceholder.style.display = 'none';
                    dropZone.style.borderColor = 'transparent';
                }
                reader.readAsDataURL(file);
            }
        }

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        removeImg.addEventListener('click', (e) => {
            e.stopPropagation();
            selectedFile = null; imagePreview.style.display = 'none';
            removeImg.style.display = 'none'; uploadPlaceholder.style.display = 'flex';
            fileInput.value = ''; dropZone.style.borderColor = 'rgba(139, 92, 246, 0.2)';
        });

        document.getElementById('postTitle').addEventListener('input', (e) => {
            document.getElementById('postSlug').value = e.target.value.toLowerCase().trim().replace(/ /g, '-').replace(/[^\w-]+/g, '');
        });

        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Start writing your story...',
            modules: {
                imageResize: { displaySize: true },
                toolbar: [[{ 'header': [1, 2, 3, false] }], ['bold', 'italic', 'underline', 'strike'], ['blockquote', 'code-block'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['link', 'image', 'video'], ['clean']]
            }
        });

        quill.on('text-change', () => {
            const text = quill.getText();
            const words = text.trim().split(/\s+/).length;
            document.getElementById('readTime').innerText = `${Math.ceil(words / 200)} min read`;
        });

        document.getElementById('publishBtn').addEventListener('click', async () => {
            const title = document.getElementById('postTitle').value;
            const slug = document.getElementById('postSlug').value;
            const meta = document.getElementById('metaDesc').value;
            const category = document.getElementById('categoryInput').value || "General";
            const content = quill.root.innerHTML;

            if(!title || !selectedFile) return alert("Headline and Cover Image are required!");

            let GITHUB_TOKEN = localStorage.getItem('my_gh_token');
            if (!GITHUB_TOKEN) {
                GITHUB_TOKEN = prompt("Enter GitHub Token:");
                if (GITHUB_TOKEN) localStorage.setItem('my_gh_token', GITHUB_TOKEN); else return;
            }

            const btn = document.getElementById('publishBtn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> DEPLOYING...';
            btn.disabled = true;

            try {
                const storageRef = ref(storage, 'thumbnails/' + Date.now() + "_" + selectedFile.name);
                const snapshot = await uploadBytes(storageRef, selectedFile);
                const imageURL = await getDownloadURL(snapshot.ref);

                await addDoc(collection(db, "blogs"), { title, slug, category, image: imageURL, timestamp: serverTimestamp() });

                const htmlTemplate = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>\${title} | Md Arafat Hosen</title>
    <meta name="description" content="\${meta}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .blog-container { padding: 140px 20px 60px; max-width: 850px; margin: 0 auto; min-height: 80vh; }
        .post-category { color: #6366f1; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block; }
        .post-title { color: #1e293b; margin-bottom: 25px; font-size: 2.5rem; line-height: 1.2; font-weight: 800; }
        .featured-img { width: 100%; border-radius: 20px; margin-bottom: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        article { font-size: 1.15rem; color: #334155; line-height: 1.8; }
        .btn-nav { background: #3b82f6; color: white !important; padding: 12px 25px; border-radius: 10px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <header><div class="container nav-container"><a href="../index.html" class="logo">Md Arafat Hosen</a><nav><ul class="nav-links"><li><a href="../index.html">Home</a></li><li><a href="../blog.html">Blog</a></li></ul></nav></div></header>
    <main class="blog-container">
        <span class="post-category">\${category}</span>
        <h1 class="post-title">\${title}</h1>
        <img src="\${imageURL}" class="featured-img">
        <article>\${content}</article>
        <div class="post-navigation" style="margin-top:50px; display:flex; gap:10px;">
            <a href="../blog.html" class="btn-nav" style="background:#64748b;">All Posts</a>
            <div id="navGroup"></div>
        </div>
    </main>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U", authDomain: "md-arafat-hosen.firebaseapp.com", projectId: "md-arafat-hosen" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        async function initNav() {
            const currentSlug = "\${slug}";
            const q = query(collection(db, "blogs"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            const blogs = [];
            querySnapshot.forEach(doc => blogs.push(doc.data()));
            const index = blogs.findIndex(b => b.slug === currentSlug);
            const navGroup = document.getElementById('navGroup');
            if (index !== -1) {
                if (index < blogs.length - 1) navGroup.innerHTML += '<a href="' + blogs[index + 1].slug + '.html" class="btn-nav">Previous</a>';
                if (index > 0) navGroup.innerHTML += '<a href="' + blogs[index - 1].slug + '.html" class="btn-nav" style="margin-left:10px">Next</a>';
            }
        }
        initNav();
    <\/script>
</body>
</html>`;

                const finalHTML = htmlTemplate
                    .replace(/\${title}/g, title).replace(/\${category}/g, category).replace(/\${meta}/g, meta)
                    .replace(/\${imageURL}/g, imageURL).replace(/\${content}/g, content).replace(/\${slug}/g, slug);

                const encoded = btoa(unescape(encodeURIComponent(finalHTML)));
                const githubURL = `https://api.github.com/repos/ArafatBook/Md-Arafat-Hosen/contents/posts/${slug}.html`;

                const res = await fetch(githubURL, {
                    method: "PUT",
                    headers: { "Authorization": "token " + GITHUB_TOKEN, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "CMS: " + title, content: encoded })
                });

                if(res.ok) { alert("🚀 Post is live on GitHub!"); location.reload(); }
                else { alert("GitHub API Error"); }

            } catch (e) { alert("Error: " + e.message); }
            finally { btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> PUBLISH LIVE'; btn.disabled = false; }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "login.html");
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="https://lh3.googleusercontent.com/u/0/d/1oSezMeeMzuX0q9EPG3dYFhrdr0yhADMx">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Md Arafat Hosen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">Md Arafat Hosen</a>
            
            <div class="menu-icon" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>

            <nav>
                <ul class="nav-links" id="navLinks">
                    <i class="fas fa-times close-icon" onclick="toggleMenu()"></i>
                    <li><a href="index.html#home" onclick="toggleMenu()">Home</a></li>
                    <li><a href="index.html#services" onclick="toggleMenu()">Service</a></li>
                    <li><a href="index.html#contact" onclick="toggleMenu()">Contact</a></li>
                    <li><a href="blog.html" class="btn-blog" onclick="toggleMenu()">Blog</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="services-section container" style="min-height: 80vh; padding-top: 120px;">
        <h2 class="section-title">Latest Blog Posts</h2>
        
        <div id="blog-posts-container" class="services-grid">
            <p style="text-align: center; grid-column: 1/-1;">Loading...</p>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 Md Arafat Hosen. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCz2b-l4frCr-J1Jx98Rnr-JeCaWyMO22U",
            authDomain: "md-arafat-hosen.firebaseapp.com",
            projectId: "md-arafat-hosen",
            storageBucket: "md-arafat-hosen.firebasestorage.app",
            appId: "1:170687583576:web:ebffeccc9f6ead20cd412d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchBlogs() {
            const container = document.getElementById('blog-posts-container');
            let combinedData = [];

            try {
                // ১. blogs.json থেকে ডেটা ফেচ করা (আপনার আগের লজিক)
                try {
                    const response = await fetch('blogs.json');
                    if(response.ok) {
                        const jsonData = await response.json();
                        jsonData.forEach(post => combinedData.push({
                            title: post.title,
                            desc: post.desc || "Manual Archive Post",
                            link: post.link
                        }));
                    }
                } catch (e) { console.log("JSON load failed or empty"); }

                // ২. Firebase থেকে ডেটা ফেচ করা (ড্যাশবোর্ড পোস্ট)
                try {
                    const q = query(collection(db, "blogs"), orderBy("timestamp", "desc"));
                    const querySnapshot = await getDocs(q);
                    querySnapshot.forEach((doc) => {
                        const fbPost = doc.data();
                        combinedData.push({
                            title: fbPost.title,
                            desc: fbPost.category || "New Update",
                            link: `posts/${fbPost.slug}.html`
                        });
                    });
                } catch (e) { console.log("Firebase load failed"); }

                // ৩. কন্টেইনারে ডেটা দেখানো (আপনার দেওয়া আগের ডিজাইনে)
                container.innerHTML = ''; 

                if (combinedData.length === 0) {
                    container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">No posts available.</p>';
                    return;
                }

                combinedData.forEach(post => {
                    container.innerHTML += `
                        <div class="service-card">
                            <h3>${post.title}</h3>
                            <p>${post.desc}</p>
                            <br>
                            <a href="${post.link}" class="btn">Read More</a>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("General Error loading posts");
                container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Error loading content.</p>';
            }
        }

        // পেজ লোড হলে ফাংশনটি কল হবে
        window.onload = fetchBlogs;
    </script>

    <script>
        function toggleMenu() {
            document.getElementById("navLinks").classList.toggle("active");
        }
    </script>
</body>
</html>

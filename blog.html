<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Md Arafat Hosen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">Md Arafat Hosen</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="blog.html" class="btn-blog">Blog</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="services-section container" style="min-height: 80vh; padding-top: 120px;">
        <h2 class="section-title">My Recent Blog Posts</h2>
        <div id="blog-posts-container" class="services-grid"></div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 Md Arafat Hosen. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function loadBlogs() {
            const response = await fetch('blogs.json');
            const posts = await response.json();
            const container = document.getElementById('blog-posts-container');
            
            container.innerHTML = posts.map(post => `
                <div class="service-card">
                    <div class="icon-box"><i class="${post.icon}"></i></div>
                    <h3>${post.title}</h3>
                    <p>${post.desc}</p>
                    <br>
                    <a href="${post.link}" class="btn">Read More</a>
                </div>
            `).join('');
        }
        window.onload = loadBlogs;
    </script>
</body>
</html>

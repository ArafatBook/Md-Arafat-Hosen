<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:#fff;
}

.card{
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    text-align:center;
}

.logo{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:15px;
}

.logo img{
    width:50px;
    height:50px;
    margin-right:10px;
    border-radius:10px;
}

.brand{
    font-size:22px;
    font-weight:600;
}

h1{
    font-size:90px;
    font-weight:700;
    margin:10px 0;
}

p{
    margin-bottom:20px;
    opacity:0.8;
}

.search-box{
    display:flex;
    margin-bottom:20px;
}

.search-box input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:25px 0 0 25px;
    outline:none;
}

.search-box button{
    padding:10px 20px;
    border:none;
    border-radius:0 25px 25px 0;
    background:#fff;
    cursor:pointer;
    font-weight:500;
    transition:0.3s;
}

.search-box button:hover{
    background:#4facfe;
    color:#fff;
}

.btn{
    display:inline-block;
    padding:10px 25px;
    border-radius:25px;
    background:#fff;
    color:#000;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.timer{
    margin-top:15px;
    font-size:14px;
    opacity:0.7;
}

@media(max-width:500px){
    h1{font-size:70px;}
}
</style>
</head>
<body>

<div class="card">

    <!-- Logo + Brand -->
    <div class="logo">
        <img src="https://lh3.googleusercontent.com/u/0/d/1oSezMeeMzuX0q9EPG3dYFhrdr0yhADMx" alt="Logo" width="50" height="50">
        <div class="brand">Md Arafat Hosen</div>
    </div>

    <h1>404</h1>
    <p>Oops! The page you're looking for doesn’t exist.</p>

    <!-- Search -->
    <div class="search-box">
        <input type="text" placeholder="Search...">
        <button onclick="searchPage()">Search</button>
    </div>

    <a href="/" class="btn">Go Home</a>

    <div class="timer">
        Redirecting to homepage in <span id="count">10</span> seconds...
    </div>

</div>

<script>
// Auto Redirect
let seconds = 10;
let countdown = document.getElementById("count");

let interval = setInterval(function(){
    seconds--;
    countdown.textContent = seconds;
    if(seconds <= 0){
        clearInterval(interval);
        window.location.href = "/";
    }
},1000);

// Search Function
function searchPage(){
    let query = document.querySelector(".search-box input").value;
    if(query.trim() !== ""){
        // Customize your search URL here
        window.location.href = "/search?q=" + encodeURIComponent(query);
    }
}
</script>

</body>
</html>

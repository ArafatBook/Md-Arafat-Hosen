<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        /* Animated 404 Text */
        .error-code {
            font-size: 10rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Stylish Button */
        .home-btn {
            text-decoration: none;
            color: #fff;
            background: #3b82f6;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .home-btn:hover {
            background: #2563eb;
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
        }

        /* Decorative Circles */
        .circle {
            position: absolute;
            z-index: -1;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.1);
            filter: blur(50px);
        }

        .c1 { width: 300px; height: 300px; top: -100px; left: -100px; }
        .c2 { width: 400px; height: 400px; bottom: -150px; right: -150px; }
    </style>
</head>
<body>

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="container">
        <div class="error-code">404</div>
        <h1>Lost in Space?</h1>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track.</p>
        
        <a href="/" class="home-btn">Return Home</a>
    </div>

</body>
</html>

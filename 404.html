<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Md Arafat Hosen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Styles for 404 Page */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 20px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: var(--primary-color, #3498db); /* Matches your primary theme color */
            margin: 0;
            line-height: 1;
        }

        .error-message {
            font-size: 24px;
            margin: 20px 0;
            color: #333;
        }

        .error-desc {
            max-width: 500px;
            margin-bottom: 30px;
            color: #666;
        }

        .back-home-btn {
            padding: 12px 30px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .error-icon {
            font-size: 60px;
            margin-bottom: 10px;
            color: #e74c3c;
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html#home" class="logo">Md Arafat Hosen</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#services">Service</a></li>
                    <li><a href="blog.html" class="btn-blog">Blog</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 class="error-code">404</h1>
        <h2 class="error-message">Oops! Page Not Found</h2>
        <p class="error-desc">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <a href="index.html" class="btn btn-primary back-home-btn">Return to Home</a>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Md Arafat Hosen. All rights reserved.</p>
            <div class="social-links">
                <a href="https://www.facebook.com/MdArafatHosen0" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/mdarafathosen900" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.linkedin.com/in/md-arafat-yasine" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://www.youtube.com/@MdArafatHosen0" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
